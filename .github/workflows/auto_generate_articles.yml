name: Auto Generate Articles

on:
  schedule:
    # This cron expression will trigger the workflow every minute
    - cron: '*/1 * * * *'

jobs:
  generate_articles:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Set a timeout to prevent infinite runs if something goes wrong

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python environment
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3  # Install boto3 for AWS S3 interactions
          pip install retrying  # Install retrying library for better retry logic

      - name: Run the article generation script
        run: |
          python keyword_processor_s3.py  # Path to your Python script that generates articles and uploads to S3
