name: Claudio Empire Pipeline

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

# Prevent multiple overlapping runs (important for 30-min automation)
concurrency:
  group: claudio-empire-pipeline
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping install"
          fi

      - name: Run article pipeline
        run: |
          if [ -f article-pipeline.js ]; then
            node article-pipeline.js
          else
            echo "article-pipeline.js not found - skipping"
            exit 1
          fi

      - name: Commit generated changes (if any)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update generated content [skip ci]"
            git push
          fi
