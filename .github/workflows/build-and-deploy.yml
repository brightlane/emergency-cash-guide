name: Continuous SEO Generator

on:
  push:
    branches: ["main"]

  workflow_dispatch:

  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes (GitHub minimum-safe interval)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: seo-generator
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      # -------------------------
      # CORE GENERATION PIPELINE
      # -------------------------

      - name: Decide what to build
        run: node intent-classifier.js

      - name: Generate small batch of articles
        run: node article-generator.js

      - name: Generate page variants
        run: node gem-page-generator.js

      - name: Optimize SEO
        run: node seo-optimizer.js

      - name: Build sitemap
        run: node sitemap-generator.js

      # -------------------------
      # OUTPUT PREP
      # -------------------------

      - name: Prepare site output
        run: |
          mkdir -p public
          cp -r output/* public/ || true
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
