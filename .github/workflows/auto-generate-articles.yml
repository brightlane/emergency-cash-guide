  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latestname: Auto Generate Articles

on:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate articles
        run: |
          mkdir -p articles

          for i in {1..3}; do
            FILE="articles/article-$(date +%s)-$i.md"
            echo "# Emergency Cash Article $i" > $FILE
            echo "" >> $FILE
            echo "This is an auto-generated article about emergency cash strategies." >> $FILE
            echo "More content can be expanded here for SEO and readability." >> $FILE
          done

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add articles/

          git commit -m "Auto-generate articles [skip ci]" || exit 0

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

    steps:
      - uses: actions/checkout@v4

      - name: Generate articles
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p articles

          for i in {1..3}; do
            TITLE="Emergency Cash Tip $(date +%s)-$i"

            RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"model\": \"gpt-4o-mini\",
                \"messages\": [
                  {
                    \"role\": \"system\",
                    \"content\": \"You are a professional financial writer creating high-quality, SEO-optimized blog articles.\"
                  },
                  {
                    \"role\": \"user\",
                    \"content\": \"Write a 700-word SEO-optimized article about: $TITLE. Include headings, actionable advice, and a strong introduction and conclusion.\"
                  }
                ]
              }")

            CONTENT=$(echo $RESPONSE | jq -r '.choices[0].message.content')

            FILE="articles/article-$(date +%s)-$i.md"

            echo "# $TITLE" > $FILE
            echo "" >> $FILE
            echo "$CONTENT" >> $FILE
          done

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add articles/

          git diff --cached --quiet || git commit -m "Auto-generate articles [skip ci]"
          git push
