name: Auto Generate Articles

on:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run generators
        run: |
          mkdir -p articles

          # Example generator output (replace with your real scripts)
          node article-generator.js || true
          node content-architect.js || true

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --cached --quiet && exit 0

          git commit -m "Auto-generate articles [skip ci]"

      - name: Push changes (FIXED)
        run: |
          git push origin HEAD:main
