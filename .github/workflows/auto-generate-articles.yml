name: Auto Generate Articles

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run generators
        run: |
          mkdir -p articles

          # Run your existing generator system
          node article-generator.js || true
          node content-architect.js || true
          node seo-optimizer.js || true

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Auto-generate articles [skip ci]"

      - name: Push changes (fixed)
        run: |
          git push origin HEAD:main
