name: Auto Generate Meta Tags

on:
  push:
    branches: [main]

jobs:
  generate_meta_tags:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install boto3

      - name: Run script
        env:
          S3_BUCKET_NAME: your-bucket-name
          AWS_REGION: us-east-1
        run: python generate_meta_tags.py
